<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MdConvertor — تبدیل Markdown به PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.6/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0;
      --text: #0f172a; --text-secondary: #64748b;
      --primary: #3b82f6; --primary-hover: #2563eb; --primary-light: #eff6ff;
      --success: #10b981; --danger: #ef4444;
      --radius: 12px; --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Vazirmatn', 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      line-height: 1.7;
    }

    .header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem; display: flex; align-items: center; gap: 0.8rem;
      box-shadow: var(--shadow);
    }

    .header h1 {
      font-size: 1.3rem; font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header span { color: var(--text-secondary); font-size: 0.85rem; margin-inline-start: auto; }
    .header .gh-link { color: var(--text-secondary); font-size: 0.85rem; text-decoration: none; margin-inline-start: 1rem; }
    .header .gh-link:hover { color: var(--primary); }

    .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem; }
    @media (max-width: 860px) { .container { grid-template-columns: 1fr; } }

    /* ===== Upload ===== */
    .upload-area {
      background: var(--surface); border: 2px dashed var(--border);
      border-radius: var(--radius); padding: 2.5rem 2rem; text-align: center;
      cursor: pointer; transition: all 0.2s;
    }
    .upload-area:hover, .upload-area.dragover { border-color: var(--primary); background: var(--primary-light); }
    .upload-area.has-file { border-style: solid; border-color: var(--success); }
    .upload-area .icon { font-size: 2.5rem; margin-bottom: 0.5rem; opacity: 0.6; }
    .upload-area h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.2rem; }
    .upload-area p { color: var(--text-secondary); font-size: 0.85rem; }
    .or-divider { display: flex; align-items: center; gap: 0.8rem; margin: 1rem 0; color: var(--text-secondary); font-size: 0.8rem; }
    .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .upload-area textarea {
      width: 100%; min-height: 120px; padding: 0.8rem;
      border: 1px solid var(--border); border-radius: 8px;
      font-family: 'Fira Code', 'Vazirmatn', monospace; font-size: 0.85rem;
      resize: vertical; direction: ltr; text-align: left;
    }
    .upload-area textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }

    /* ===== Preview ===== */
    .preview-area {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
    }
    .preview-area .preview-header {
      padding: 0.8rem 1.2rem; border-bottom: 1px solid var(--border);
      font-weight: 600; font-size: 0.85rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .preview-area .preview-body {
      padding: 1.2rem; max-height: 450px; overflow-y: auto;
      font-size: 0.8rem; line-height: 1.7;
    }
    .preview-body .empty { text-align: center; padding: 2rem 0; color: #94a3b8; }
    .preview-body h1 { font-size: 1.2em; margin-top: 1em; margin-bottom: 0.3em; color: var(--text); }
    .preview-body h2 { font-size: 1.05em; margin-top: 0.8em; margin-bottom: 0.2em; color: var(--text); }
    .preview-body h3 { font-size: 0.95em; margin-top: 0.6em; }
    .preview-body p { margin-bottom: 0.4em; }
    .preview-body code { background: var(--bg); padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.85em; }
    .preview-body pre { background: #1f2937; color: #e5e7eb; padding: 0.6em; border-radius: 6px; overflow-x: auto; direction: ltr; text-align: left; margin: 0.5em 0; }
    .preview-body pre code { background: none; padding: 0; color: inherit; }
    .preview-body table { font-size: 0.85em; border-collapse: collapse; margin: 0.5em 0; }
    .preview-body th, .preview-body td { border: 1px solid var(--border); padding: 0.3em 0.5em; }
    .preview-body th { background: var(--bg); }
    .preview-body blockquote { border-inline-start: 3px solid var(--primary); padding: 0.3em 0.8em; margin: 0.5em 0; background: var(--primary-light); border-radius: 0 4px 4px 0; font-style: italic; color: #1e40af; }

    /* ===== Options Panel ===== */
    .options-panel {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 1.2rem; position: sticky; top: 1.5rem;
    }
    .options-panel h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .option-group { margin-bottom: 0.8rem; }
    .option-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.2rem; }
    .option-group select, .option-group input[type="text"], .option-group input[type="number"] {
      width: 100%; padding: 0.4rem 0.6rem; border: 1px solid var(--border);
      border-radius: 6px; font-family: inherit; font-size: 0.85rem;
      color: var(--text); background: var(--bg); transition: border 0.15s;
    }
    .option-group select:focus, .option-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .option-group.inline { display: flex; gap: 0.6rem; }
    .option-group.inline > * { flex: 1; }
    .option-group.checkbox { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .option-group.checkbox label { margin-bottom: 0; cursor: pointer; }
    .option-group.checkbox input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--primary); }
    .cover-options { display: none; margin-top: 0.5rem; padding: 0.6rem; background: var(--bg); border-radius: 8px; }
    .cover-options.show { display: block; }
    .cover-options input { margin-bottom: 0.4rem; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      width: 100%; padding: 0.65rem 1rem; border: none; border-radius: 8px;
      font-family: inherit; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #059669; }
    .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface-hover, #f1f5f9); }

    .action-section { margin-top: 1rem; padding-top: 0.8rem; border-top: 1px solid var(--border); }
    .action-section .btn + .btn { margin-top: 0.5rem; }

    /* ===== Print styles (PDF output) ===== */
    @media print {
      body { background: white; }
      .header, .options-panel, .upload-area, .preview-area { display: none !important; }
      .container { max-width: 100%; margin: 0; padding: 0; display: block; }

      .print-output {
        display: block !important;
      }
    }

    .print-output {
      display: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>MdConvertor</h1>
    <span>Markdown &rarr; PDF</span>
    <a class="gh-link" href="https://github.com/hosseinMsh/MdConvertor" target="_blank">GitHub</a>
  </div>

  <div class="container">
    <!-- Left column -->
    <div>
      <div class="upload-area" id="dropZone">
        <div class="icon">📄</div>
        <h2>فایل Markdown را انتخاب کنید</h2>
        <p>یا مستقیماً در کادر زیر بنویسید / جای‌گذاری کنید</p>
        <textarea id="editor" placeholder="محتوای Markdown خود را اینجا بنویسید یا جای‌گذاری کنید..."></textarea>
      </div>

      <div class="preview-area" style="margin-top: 1rem;">
        <div class="preview-header">
          <span>پیش‌نمایش</span>
          <span style="font-weight:400;color:var(--text-secondary);font-size:0.8rem;margin-inline-start:auto;" id="wordCount"></span>
        </div>
        <div class="preview-body" id="previewBody"><p class="empty">محتوایی وارد نشده است</p></div>
      </div>
    </div>

    <!-- Right column -->
    <div class="options-panel">
      <h3>تنظیمات خروجی</h3>

      <div class="option-group inline">
        <div>
          <label>جهت متن</label>
          <select id="lang">
            <option value="fa">فارسی (RTL)</option>
            <option value="en">انگلیسی (LTR)</option>
            <option value="ar">عربی (RTL)</option>
            <option value="he">عبری (RTL)</option>
          </select>
        </div>
        <div>
          <label>اجبار جهت</label>
          <select id="direction">
            <option value="auto">خودکار</option>
            <option value="rtl">RTL</option>
            <option value="ltr">LTR</option>
          </select>
        </div>
      </div>

      <div class="option-group"><label>قالب رنگی</label>
        <select id="theme">
          <option value="light">روشن (Light)</option>
          <option value="dark">تیره (Dark)</option>
          <option value="sepia">سپیا (Sepia)</option>
        </select>
      </div>

      <div class="option-group inline">
        <div><label>اندازه صفحه</label>
          <select id="pageSize">
            <option value="A4">A4</option>
            <option value="Letter">Letter</option>
            <option value="Legal">Legal</option>
            <option value="A3">A3</option>
            <option value="A5">A5</option>
          </select>
        </div>
        <div><label>جهت صفحه</label>
          <select id="orientation">
            <option value="portrait">عمودی</option>
            <option value="landscape">افقی</option>
          </select>
        </div>
      </div>

      <div class="option-group inline">
        <div><label>حاشیه (mm)</label><input type="number" id="margin" value="20" min="5" max="50"></div>
        <div><label>قلم (pt)</label><input type="number" id="fontSize" value="11" min="8" max="20" step="0.5"></div>
      </div>
      <div class="option-group"><label>فاصله خطوط</label><input type="number" id="lineHeight" value="1.9" min="1" max="3" step="0.1"></div>

      <div class="option-group checkbox">
        <input type="checkbox" id="cover">
        <label for="cover">صفحه جلد (کاور)</label>
      </div>
      <div class="cover-options" id="coverOptions">
        <div class="option-group"><input type="text" id="coverTitle" placeholder="عنوان سند"></div>
        <div class="option-group"><input type="text" id="coverAuthor" placeholder="نویسنده"></div>
      </div>

      <div class="option-group checkbox"><input type="checkbox" id="toc"><label for="toc">فهرست مطالب</label></div>
      <div class="option-group checkbox"><input type="checkbox" id="pageNumbers" checked><label for="pageNumbers">شماره صفحات</label></div>

      <div class="action-section">
        <button class="btn btn-primary" id="savePdfBtn">💾 ذخیره به‌صورت PDF</button>
        <button class="btn btn-secondary" id="printBtn" style="margin-top:0.4rem;">🖨 چاپ / Print</button>
      </div>
    </div>
  </div>

  <!-- Hidden print output -->
  <div class="print-output" id="printOutput"></div>

  <script>
    const RTL_LANGS = ['fa', 'ar', 'he', 'ur', 'ps', 'sd', 'yi', 'dv'];
    const themes = {
      light: { bg: '#ffffff', text: '#1a1a1a', textSecondary: '#64748b', heading1: '#0a0a0a', heading2: '#111827', heading3: '#1f2937', heading4: '#374151', border: '#e5e7eb', link: '#2563eb', codeBg: '#f3f4f6', codeColor: '#dc2626', preBg: '#1f2937', preColor: '#e5e7eb', blockquoteBg: 'linear-gradient(135deg, #f0f5ff 0%, #fafcff 100%)', blockquoteColor: '#1e40af', blockquoteBorder: '#3b82f6', tableBorder: '#d1d5db', tableHeadBg: '#f3f4f6', tableStripe: '#f9fafb', hrColor: '#e5e7eb', shadow: 'rgba(0,0,0,0.08)', coverBg: 'linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1e40af 100%)', coverText: '#ffffff', coverAccent: '#60a5fa' },
      dark: { bg: '#0d1117', text: '#e6edf3', textSecondary: '#8b949e', heading1: '#f0f6fc', heading2: '#e6edf3', heading3: '#d2d8e0', heading4: '#bdc4cc', border: '#30363d', link: '#58a6ff', codeBg: '#161b22', codeColor: '#f98181', preBg: '#161b22', preColor: '#e6edf3', blockquoteBg: 'linear-gradient(135deg, #0d1d35 0%, #111d2e 100%)', blockquoteColor: '#79c0ff', blockquoteBorder: '#58a6ff', tableBorder: '#30363d', tableHeadBg: '#161b22', tableStripe: '#0d1117', hrColor: '#30363d', shadow: 'rgba(0,0,0,0.3)', coverBg: 'linear-gradient(135deg, #000000 0%, #0d1d35 50%, #0d1117 100%)', coverText: '#f0f6fc', coverAccent: '#58a6ff' },
      sepia: { bg: '#fbf7f0', text: '#3b2e1e', textSecondary: '#7d6b55', heading1: '#2c1f0e', heading2: '#3b2e1e', heading3: '#4a3d2d', heading4: '#5a4d3d', border: '#d4c5a9', link: '#8b5e3c', codeBg: '#f0e9db', codeColor: '#a04030', preBg: '#2c2416', preColor: '#e6dcc8', blockquoteBg: 'linear-gradient(135deg, #f5ede0 0%, #faf4ea 100%)', blockquoteColor: '#6b4e2e', blockquoteBorder: '#c4955a', tableBorder: '#d4c5a9', tableHeadBg: '#f0e9db', tableStripe: '#f5ede0', hrColor: '#d4c5a9', shadow: 'rgba(0,0,0,0.1)', coverBg: 'linear-gradient(135deg, #2c2416 0%, #4a3d2d 50%, #6b4e2e 100%)', coverText: '#fbf7f0', coverAccent: '#d4a05a' }
    };

    const coverCheck = document.getElementById('cover');
    const coverOptions = document.getElementById('coverOptions');
    coverCheck.addEventListener('change', () => coverOptions.classList.toggle('show', coverCheck.checked));

    const editor = document.getElementById('editor');
    const previewBody = document.getElementById('previewBody');
    const wordCount = document.getElementById('wordCount');
    const printOutput = document.getElementById('printOutput');

    // Re-render preview on any change
    function renderPreview() {
      const md = editor.value;
      if (!md.trim()) {
        previewBody.innerHTML = '<p class="empty">محتوایی وارد نشده است</p>';
        wordCount.textContent = '';
        return;
      }
      try {
        const html = marked.parse(md);
        // Render KaTeX in the preview
        const withMath = renderMathInHtml(html);
        previewBody.innerHTML = withMath;
        const words = md.split(/\\s+/).filter(Boolean).length;
        wordCount.textContent = '~' + words + ' کلمه';
      } catch (e) {
        previewBody.innerHTML = '<p style="color:var(--danger)">خطا: ' + e.message + '</p>';
      }
    }

    function renderMathInHtml(html) {
      // Simple KaTeX rendering for $...$ and $$...$$ in HTML
      html = html.replace(/\\$\\$([^$]+?)\\$\\$/g, (_, expr) => {
        try { return katex.renderToString(expr.trim(), { displayMode: true, throwOnError: false, strict: false }); }
        catch(e) { return '<span style="color:red">' + expr + '</span>'; }
      });
      return html;
    }

    let renderDebounce;
    editor.addEventListener('input', () => {
      clearTimeout(renderDebounce);
      renderDebounce = setTimeout(renderPreview, 200);
    });

    // Generate full document HTML for print/PDF
    function buildPrintHtml() {
      const md = editor.value;
      if (!md.trim()) return '';

      const lang = document.getElementById('lang').value;
      const dir = document.getElementById('direction').value;
      const themeName = document.getElementById('theme').value;
      const pageSize = document.getElementById('pageSize').value;
      const orientation = document.getElementById('orientation').value;
      const margin = document.getElementById('margin').value;
      const fontSize = document.getElementById('fontSize').value;
      const lineHeight = document.getElementById('lineHeight').value;
      const hasCover = coverCheck.checked;
      const coverTitle = document.getElementById('coverTitle').value;
      const coverAuthor = document.getElementById('coverAuthor').value;
      const hasToc = document.getElementById('toc').checked;
      const hasPageNumbers = document.getElementById('pageNumbers').checked;

      const isRTL = dir === 'rtl' || (dir === 'auto' && RTL_LANGS.includes(lang));
      const T = themes[themeName] || themes.light;

      const fontFamily = isRTL ? "'Vazirmatn', 'Inter', 'Tahoma', sans-serif" : "'Inter', 'Vazirmatn', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";

      let bodyHtml = '';
      try {
        bodyHtml = marked.parse(md);
        // Render KaTeX
        bodyHtml = bodyHtml.replace(/\\$\\$([^$]+?)\\$\\$/g, (_, x) => {
          try { return katex.renderToString(x.trim(), { displayMode: true, throwOnError: false, strict: false }); } catch(e) { return x; }
        });
        bodyHtml = bodyHtml.replace(/\\$([^$]+?)\\$/g, (_, x) => {
          try { return katex.renderToString(x.trim(), { displayMode: false, throwOnError: false, strict: false }); } catch(e) { return x; }
        });
      } catch(e) { bodyHtml = '<p style="color:red">' + e.message + '</p>'; }

      let coverHtml = '';
      if (hasCover && (coverTitle || coverAuthor)) {
        coverHtml = '<div class="cover-page"><div class="cover-inner"><div class="cover-accent-line"></div>' +
          (coverTitle ? '<h1 class="cover-title">' + coverTitle + '</h1>' : '') +
          (coverAuthor ? '<p class="cover-author">' + coverAuthor + '</p>' : '') +
          '<div class="cover-divider"></div><p class="cover-date">' + new Date().toLocaleDateString(lang === 'fa' ? 'fa-IR' : 'en-US', { year:'numeric', month:'long', day:'numeric' }) + '</p></div></div><div class="page-break"></div>';
      }

      let tocHtml = '';
      if (hasToc) {
        const items = [];
        const re = /^#{1,6}\s+(.+)$/gm;
        let m;
        while ((m = re.exec(md)) !== null) items.push(m[1]);
        if (items.length) {
          tocHtml = '<div class="toc-page"><h2 class="toc-title">' + (isRTL ? 'فهرست مطالب' : 'Table of Contents') + '</h2>' +
            items.map((t, i) => '<div style="padding-inline-start:' + (Math.min(i,3)*1.2) + 'em;margin-bottom:0.3em">' + t + '</div>').join('') +
            '</div><div class="page-break"></div>';
        }
      }

      const printCss = `
        @page { margin: 0; size: ${pageSize} ${orientation === 'landscape' ? 'landscape' : 'portrait'}; }
        body { font-family: ${fontFamily}; font-size: ${fontSize}pt; line-height: ${lineHeight}; color: ${T.text}; background: white; padding: 0; orphans:3; widows:3; }
        .page { padding: ${margin}mm; }
        .cover-page { display:flex; align-items:center; justify-content:center; height:297mm; background:${T.coverBg}; color:${T.coverText}; text-align:center; padding:20mm; }
        .cover-inner { max-width:80%; }
        .cover-accent-line { width:60px; height:4px; background:${T.coverAccent}; margin:0 auto 1.5em; border-radius:2px; }
        .cover-title { font-size:${fontSize*3.5}pt; font-weight:700; color:${T.coverText}; border:none; margin:0 0 0.4em; padding:0; letter-spacing:0.02em; line-height:1.3; }
        .cover-author { font-size:${fontSize*1.3}pt; color:${T.coverAccent}; margin-bottom:0; font-weight:400; opacity:0.9; }
        .cover-divider { width:40px; height:2px; background:${T.coverAccent}; margin:1.2em auto; opacity:0.5; }
        .cover-date { font-size:${fontSize*0.9}pt; color:${T.coverText}; opacity:0.6; font-weight:300; }
        .page-break { page-break-after:always; height:0; }
        .toc-page { padding:${margin}mm; }
        .toc-title { font-size:${fontSize*1.8}pt; color:${T.heading1}; border-bottom:2px solid ${T.border}; padding-bottom:0.3em; margin-bottom:0.8em; }
        h1 { font-size:${fontSize*2.2}pt; font-weight:700; color:${T.heading1}; margin-top:1.6em; margin-bottom:0.5em; padding-bottom:0.25em; border-bottom:2.5px solid ${T.border}; page-break-after:avoid; letter-spacing:-0.01em; }
        h2 { font-size:${fontSize*1.7}pt; font-weight:700; color:${T.heading2}; margin-top:1.3em; margin-bottom:0.4em; padding-bottom:0.2em; border-bottom:1px solid ${T.border}; page-break-after:avoid; }
        h3 { font-size:${fontSize*1.4}pt; font-weight:600; color:${T.heading3}; margin-top:1.2em; margin-bottom:0.3em; page-break-after:avoid; }
        h4, h5, h6 { font-size:${fontSize*1.15}pt; font-weight:600; color:${T.heading4}; margin-top:1em; margin-bottom:0.3em; page-break-after:avoid; }
        p { margin-bottom:0.7em; text-align:start; hyphens:auto; }
        a { color:${T.link}; text-decoration:none; border-bottom:1px solid transparent; }
        ul, ol { margin:0.5em 0; }
        li { margin-bottom:0.25em; }
        blockquote { margin:1em 0; padding:0.8em 1em 0.8em 1.2em; border-inline-start:4px solid ${T.blockquoteBorder}; background:${T.blockquoteBg}; border-radius:0 6px 6px 0; color:${T.blockquoteColor}; font-style:italic; }
        code { font-family:'Fira Code','SF Mono','Consolas',monospace; font-size:0.88em; background:${T.codeBg}; padding:0.15em 0.45em; border-radius:4px; color:${T.codeColor}; word-break:break-word; }
        pre { margin:1em 0; padding:1em 1.2em; background:${T.preBg}; border-radius:8px; overflow-x:auto; direction:ltr; text-align:left; box-shadow:0 1px 3px ${T.shadow}; page-break-inside:avoid; border:1px solid ${T.border}; }
        pre code { background:none; color:${T.preColor}; padding:0; font-size:0.82em; line-height:1.7; word-break:normal; }
        table { width:100%; border-collapse:collapse; margin:1em 0; font-size:0.9em; box-shadow:0 1px 3px ${T.shadow}; border-radius:8px; overflow:hidden; page-break-inside:avoid; }
        th, td { border:1px solid ${T.tableBorder}; padding:0.55em 0.75em; text-align:start; }
        th { background:${T.tableHeadBg}; font-weight:600; color:${T.heading2}; }
        tr:nth-child(even) td { background:${T.tableStripe}; }
        hr { border:none; border-top:2px solid ${T.hrColor}; margin:1.5em 0; }
        img { max-width:100%; height:auto; border-radius:8px; margin:1em 0; box-shadow:0 2px 8px ${T.shadow}; page-break-inside:avoid; }
        strong { font-weight:700; }
        em { font-style:italic; }
        .fn-ref { font-size:0.75em; vertical-align:super; line-height:1; }
        .fn-ref a { color:${T.link}; text-decoration:none; border:none; }
        .footnotes { font-size:0.85em; color:${T.textSecondary}; margin-top:1em; }
        .fn-heading { font-size:1em; font-weight:600; color:${T.text}; margin-bottom:0.5em; }
        .fn-body { display:flex; flex-direction:column; gap:0.3em; }
        .fn-item { display:flex; align-items:baseline; gap:0.3em; line-height:1.6; }
        .fn-num { font-weight:600; color:${T.text}; min-width:1.2em; text-align:end; }
        .fn-text { flex:1; }
        .fn-text p { display:inline; margin:0; }
        .fn-back { text-decoration:none; border:none; color:${T.link}; font-size:0.85em; opacity:0.7; }
        @media print { body { -webkit-print-color-adjust:exact; print-color-adjust:exact; } }
      `;

      const dirAttr = isRTL ? 'rtl' : 'ltr';

      return '<!DOCTYPE html><html lang="' + lang + '" dir="' + dirAttr + '">' +
        '<head><meta charset="UTF-8">' +
        '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">' +
        '<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">' +
        '<style>' + printCss + '</style></head><body>' +
        coverHtml + tocHtml +
        '<div class="page">' + bodyHtml + '</div>' +
        '</body></html>';
    }

    // Save as PDF via print (browser's Save as PDF)
    document.getElementById('printBtn').addEventListener('click', () => {
      const html = buildPrintHtml();
      if (!html) return;
      printOutput.innerHTML = html;
      setTimeout(() => {
        window.focus();
        window.print();
      }, 500);
    });

    // Save as PDF by opening in new window
    document.getElementById('savePdfBtn').addEventListener('click', () => {
      const html = buildPrintHtml();
      if (!html) return;
      const win = window.open('', '_blank', 'width=800,height=600');
      win.document.write(html);
      win.document.close();
      win.focus();
      setTimeout(() => win.print(), 1000);
    });

    // Load sample button
    const sampleBtn = document.createElement('button');
    sampleBtn.className = 'btn btn-secondary';
    sampleBtn.style.cssText = 'margin-top:0.5rem';
    sampleBtn.textContent = '📝 بارگذاری نمونه محتوا';
    sampleBtn.addEventListener('click', async () => {
      try {
        const res = await fetch('./sample.md');
        const text = await res.text();
        editor.value = text;
        renderPreview();
      } catch(e) {
        editor.value = '# Sample Markdown\n\nThis is sample content. Upload a .md file to see your own.';
        renderPreview();
      }
    });
    document.querySelector('.upload-area').appendChild(sampleBtn);
  </script>
</body>
</html>
